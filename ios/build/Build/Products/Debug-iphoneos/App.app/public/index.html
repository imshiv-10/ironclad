<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IRONCLAD">
<meta name="theme-color" content="#0B0B0F">
<meta name="description" content="IRONCLAD — train like Chris Bumstead and Hrithik Roshan. Multi-coach gym programs, perfect-form video demos, set logging and rest timers.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<title>IRONCLAD · Train Like CBUM & Hrithik</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow+Condensed:wght@500;600;700&family=Sora:wght@300;400;500;600;700&display=swap');

  :root{
    --bg:#0B0B0F; --bg2:#121218; --card:#17171F; --card2:#1E1E28;
    --ink:#F5F3EF; --mut:#8E8A82; --mut2:#5E5B55;
    --accent:#FF3B30; --accent2:#FF6B5E; --accentdim:#3A1614;
    --gold:#E8B04B; --good:#39C16C; --line:#2A2A35;
    --sa-t:env(safe-area-inset-top); --sa-b:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Sora',system-ui,sans-serif; overflow:hidden;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(120% 80% at 50% -10%, #1a1320 0%, var(--bg) 55%);
  }
  .app{height:100dvh; display:flex; flex-direction:column}

  /* ---------- top bar ---------- */
  .topbar{
    padding:calc(var(--sa-t) + 14px) 20px 12px; display:flex; align-items:center; gap:12px;
    position:relative; z-index:30;
  }
  .brand{font-family:'Archivo Black',sans-serif; font-size:19px; letter-spacing:.06em}
  .brand .b1{color:var(--ink)} .brand .b2{color:var(--accent)}
  .topbar .spacer{flex:1}
  .phasepill{
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; letter-spacing:.08em;
    color:var(--accent2); background:var(--accentdim); padding:5px 11px; border-radius:999px; text-transform:uppercase;
  }

  /* ---------- scroll view ---------- */
  .view{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 16px calc(96px + var(--sa-b))}
  .view::-webkit-scrollbar{display:none}

  /* ---------- HOME ---------- */
  .hero{
    margin-top:6px; border-radius:24px; padding:22px 20px 20px; position:relative; overflow:hidden;
    background:linear-gradient(135deg,#221019 0%, #14131b 60%);
    border:1px solid var(--line);
  }
  .hero::after{content:""; position:absolute; right:-40px; top:-40px; width:180px; height:180px;
    background:radial-gradient(circle, rgba(255,59,48,.35), transparent 65%); filter:blur(8px)}
  .hero .eyebrow{font-family:'Barlow Condensed',sans-serif; font-weight:600; letter-spacing:.14em;
    text-transform:uppercase; color:var(--accent2); font-size:13px}
  .hero h1{font-family:'Archivo Black',sans-serif; font-size:30px; line-height:1.02; margin:6px 0 2px; position:relative}
  .hero .sub{color:var(--mut); font-size:13px; position:relative}
  .ring-wrap{display:flex; align-items:center; gap:18px; margin-top:18px; position:relative}
  .ring{width:84px; height:84px; flex:none}
  .ring-meta .big{font-family:'Archivo Black',sans-serif; font-size:26px; line-height:1}
  .ring-meta .lbl{color:var(--mut); font-size:12px; margin-top:3px}
  .cta{
    margin-top:18px; width:100%; border:none; border-radius:16px; padding:16px;
    background:linear-gradient(135deg,var(--accent),#D5271D); color:#fff;
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:19px; letter-spacing:.06em; text-transform:uppercase;
    position:relative; box-shadow:0 10px 30px -8px rgba(255,59,48,.5); cursor:pointer;
    transition:transform .12s ease;
  }
  .cta:active{transform:scale(.97)}

  .sec-title{font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    color:var(--mut); font-size:13px; margin:24px 4px 10px}

  .phase-cards{display:flex; flex-direction:column; gap:12px}
  .pcard{
    border-radius:20px; padding:16px 18px; background:var(--card); border:1px solid var(--line);
    display:flex; align-items:center; gap:14px; cursor:pointer; transition:transform .12s, border-color .2s;
    position:relative; overflow:hidden;
  }
  .pcard:active{transform:scale(.985)}
  .pcard .num{font-family:'Archivo Black',sans-serif; font-size:30px; color:var(--accent); width:42px; flex:none; opacity:.9}
  .pcard .pc-body{flex:1; min-width:0}
  .pcard .pc-title{font-weight:600; font-size:15px}
  .pcard .pc-months{color:var(--mut); font-size:12.5px; margin-top:2px}
  .pcard .chev{color:var(--mut2); font-size:20px}
  .pcard.active{border-color:var(--accent)}
  .pcard .bar{position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent); opacity:0; }
  .pcard.active .bar{opacity:1}

  /* ---------- DAY LIST ---------- */
  .phase-head{margin-top:10px}
  .phase-head h2{font-family:'Archivo Black',sans-serif; font-size:23px; line-height:1.05}
  .phase-head .pm{color:var(--accent2); font-family:'Barlow Condensed'; font-weight:700; letter-spacing:.1em; text-transform:uppercase; font-size:13px; margin-top:4px}
  .infochip{
    margin-top:14px; border-radius:14px; padding:12px 14px; font-size:12.5px; line-height:1.5;
    background:var(--card); border:1px solid var(--line); color:var(--mut);
  }
  .infochip b{color:var(--ink)}
  .infochip.warn{background:#1c1012; border-color:#5a221f; color:#e9b8b3}
  .infochip.warn b{color:var(--accent2)}

  .daylist{display:flex; flex-direction:column; gap:10px; margin-top:16px}
  .dcard{
    border-radius:18px; background:var(--card); border:1px solid var(--line); padding:14px 16px;
    display:flex; align-items:center; gap:12px; cursor:pointer; transition:transform .12s, background .2s;
  }
  .dcard:active{transform:scale(.985)}
  .dcard.rest{opacity:.72}
  .dcard .didx{font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; letter-spacing:.06em;
    color:var(--accent2); background:var(--accentdim); padding:4px 8px; border-radius:8px; flex:none}
  .dcard .dt{flex:1; min-width:0}
  .dcard .dt .t{font-weight:600; font-size:14.5px; line-height:1.2}
  .dcard .dt .m{color:var(--mut); font-size:12px; margin-top:3px; display:flex; gap:8px; align-items:center}
  .dcard .done{color:var(--good); font-size:12px; font-weight:600}
  .dcard .chev{color:var(--mut2)}
  .thumbs{display:flex; gap:-6px}
  .mini{width:18px; height:18px; border-radius:5px; background:var(--card2); display:grid; place-items:center; margin-left:-4px; border:1px solid var(--line)}
  .mini:first-child{margin-left:0}
  .mini svg{width:13px;height:13px}

  /* ---------- WORKOUT (exercise) ---------- */
  .wk-head{display:flex; align-items:center; gap:10px; margin-top:8px}
  .back{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--line);
    display:grid;place-items:center;cursor:pointer;flex:none}
  .back svg{width:18px;height:18px;stroke:var(--ink)}
  .wk-head .wk-t{font-family:'Archivo Black',sans-serif; font-size:18px; line-height:1.05}
  .progress-strip{display:flex; gap:5px; margin:14px 2px 4px}
  .progress-strip .seg{height:5px; border-radius:3px; flex:1; background:var(--line)}
  .progress-strip .seg.done{background:var(--good)}
  .progress-strip .seg.cur{background:var(--accent)}

  .exercise{margin-top:14px}
  .ecard{
    border-radius:22px; background:linear-gradient(160deg,var(--card2),var(--card)); border:1px solid var(--line);
    overflow:hidden;
  }
  .stage{position:relative; height:230px; background:
      radial-gradient(70% 60% at 50% 40%, #20202c, #131319);
      display:grid; place-items:center; overflow:hidden}
  .stage .floor{position:absolute; left:8%; right:8%; bottom:30px; height:2px; background:linear-gradient(90deg,transparent,var(--line),transparent)}
  .stage svg{width:200px; height:200px}
  .stage .exphoto{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0}
  .stage .tagrow,.stage .repbadge{z-index:2}
  .stage::after{content:""; position:absolute; inset:0; z-index:1;
    background:linear-gradient(180deg, rgba(11,11,15,.15) 0%, rgba(11,11,15,.05) 40%, rgba(11,11,15,.55) 100%); pointer-events:none}
  .tagrow{position:absolute; top:12px; left:12px; display:flex; gap:6px}
  .tag{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;font-size:11px;
    padding:4px 8px;border-radius:7px;text-transform:uppercase}
  .tag.fst{background:#15233a;color:#7db1ff}
  .tag.dtp{background:#3a2415;color:#ffb277}
  .tag.mus{background:var(--accentdim);color:var(--accent2)}
  .repbadge{position:absolute; bottom:12px; right:14px; font-family:'Barlow Condensed'; font-weight:700;
    color:var(--mut); font-size:12px; letter-spacing:.05em; text-transform:uppercase}

  .ebody{padding:18px}
  .ebody .name{font-family:'Archivo Black',sans-serif; font-size:21px; line-height:1.08}
  .ebody .srt{color:var(--accent2); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; letter-spacing:.04em; margin-top:6px}
  .ebody .cue{color:var(--mut); font-size:13.5px; line-height:1.55; margin-top:10px}
  .ebody .tgt{margin-top:8px; font-size:12px; color:var(--mut2)}

  .sets{margin-top:16px}
  .sets .sh{font-family:'Barlow Condensed';font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);font-size:12px;margin-bottom:8px}
  .setrow{display:flex; align-items:center; gap:12px; padding:10px 4px; border-bottom:1px solid var(--line)}
  .setrow:last-child{border-bottom:none}
  .setrow .sn{font-family:'Barlow Condensed';font-weight:700;color:var(--mut);width:54px;font-size:13px;letter-spacing:.05em}
  .setrow input{
    flex:1; min-width:0; background:var(--bg2); border:1px solid var(--line); color:var(--ink);
    border-radius:10px; padding:9px 11px; font-family:'Sora'; font-size:13px;
  }
  .setrow input::placeholder{color:var(--mut2)}
  .chk{
    width:34px;height:34px;border-radius:10px;border:2px solid var(--mut2);flex:none;cursor:pointer;
    display:grid;place-items:center;transition:all .15s;
  }
  .chk svg{width:18px;height:18px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:opacity .15s}
  .chk.on{background:var(--good);border-color:var(--good)}
  .chk.on svg{opacity:1}

  .navbtns{display:flex; gap:10px; margin-top:18px}
  .navbtns button{
    flex:1; border-radius:14px; padding:15px; border:1px solid var(--line); background:var(--card);
    color:var(--ink); font-family:'Barlow Condensed';font-weight:700;font-size:16px;letter-spacing:.05em;
    text-transform:uppercase; cursor:pointer; transition:transform .1s;
  }
  .navbtns button:active{transform:scale(.97)}
  .navbtns button.prim{background:linear-gradient(135deg,var(--accent),#D5271D);border:none;color:#fff;
    box-shadow:0 8px 22px -8px rgba(255,59,48,.5)}
  .navbtns button:disabled{opacity:.35}

  /* rest timer */
  .timer{
    margin-top:14px;border-radius:16px;background:var(--card);border:1px solid var(--line);
    padding:14px 16px;display:flex;align-items:center;gap:14px}
  .timer .tnum{font-family:'Archivo Black';font-size:26px;width:78px}
  .timer .tlabel{flex:1;color:var(--mut);font-size:12.5px}
  .timer button{background:var(--accentdim);color:var(--accent2);border:none;border-radius:10px;
    font-family:'Barlow Condensed';font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    padding:9px 13px;font-size:13px;cursor:pointer}

  /* ---------- ANATOMY / EXTRAS ---------- */
  .agrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .acard{border-radius:18px;background:var(--card);border:1px solid var(--line);padding:14px;text-align:center}
  .acard .fig{height:110px;display:grid;place-items:center}
  .acard .fig svg{width:74px;height:104px}
  .acard .an{font-family:'Barlow Condensed';font-weight:700;font-size:14px;letter-spacing:.03em;margin-top:6px}
  .acard .ad{color:var(--mut);font-size:10.5px;line-height:1.4;margin-top:5px}

  .block{border-radius:18px;background:var(--card);border:1px solid var(--line);padding:16px 18px;margin-top:14px}
  .block h3{font-family:'Barlow Condensed';font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-size:15px;color:var(--accent2)}
  .block p{color:var(--mut);font-size:13px;line-height:1.6;margin-top:8px}
  .block p b{color:var(--ink)}
  .vac-step{display:flex;gap:12px;margin-top:12px}
  .vac-step .vn{font-family:'Archivo Black';color:var(--accent);font-size:18px;width:26px;flex:none}
  .vac-step .vt{font-size:13px;color:var(--mut);line-height:1.5}
  .vac-step .vt b{color:var(--ink)}

  /* ---------- bottom tab bar ---------- */
  .tabbar{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    padding:8px 14px calc(8px + var(--sa-b));
    background:rgba(11,11,15,.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border-top:1px solid var(--line); display:flex; justify-content:space-around;
  }
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--mut2);cursor:pointer;padding:4px}
  .tab svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.9}
  .tab .tl{font-family:'Barlow Condensed';font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase}
  .tab.on{color:var(--accent)}

  /* page transitions */
  .page{animation:rise .28s cubic-bezier(.2,.7,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .stagger>*{animation:rise .4s both}
  .stagger>*:nth-child(1){animation-delay:.02s}
  .stagger>*:nth-child(2){animation-delay:.06s}
  .stagger>*:nth-child(3){animation-delay:.10s}
  .stagger>*:nth-child(4){animation-delay:.14s}
  .stagger>*:nth-child(5){animation-delay:.18s}
  .stagger>*:nth-child(6){animation-delay:.22s}
  .stagger>*:nth-child(7){animation-delay:.26s}
  .stagger>*:nth-child(8){animation-delay:.30s}
  .stagger>*:nth-child(9){animation-delay:.34s}

  .footnote{color:var(--mut2);font-size:11px;line-height:1.5;margin-top:18px;padding:0 4px}

  /* ---------- program switcher ---------- */
  .progswitch{display:flex;gap:9px;overflow-x:auto;margin:6px -16px 2px;padding:4px 16px 6px;scrollbar-width:none}
  .progswitch::-webkit-scrollbar{display:none}
  .pchip{flex:none;border:1px solid var(--line);background:var(--card);border-radius:16px;padding:11px 15px;cursor:pointer;min-width:148px;transition:transform .12s,border-color .2s;position:relative;overflow:hidden}
  .pchip:active{transform:scale(.97)}
  .pchip.on{border-color:var(--accent);background:linear-gradient(135deg,var(--accentdim),var(--card))}
  .pchip .pn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;letter-spacing:.04em}
  .pchip .pcoach{color:var(--accent2);font-size:11px;font-weight:600;margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
  .pchip .pc{color:var(--mut);font-size:11px;margin-top:3px;line-height:1.35}

  /* ---------- video buttons ---------- */
  .vidbtn{margin-top:14px;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
    border:none;border-radius:14px;padding:14px;cursor:pointer;
    background:linear-gradient(135deg,#FF1A1A,#C4302B);color:#fff;
    font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:.05em;text-transform:uppercase;
    box-shadow:0 8px 22px -10px rgba(255,0,0,.6);transition:transform .1s}
  .vidbtn:active{transform:scale(.97)}
  .vidbtn svg{width:24px;height:24px;fill:#fff;flex:none}
  .dayvid{display:inline-flex;align-items:center;gap:7px;color:#ff7a72;font-size:12.5px;font-weight:600;
    margin-top:12px;cursor:pointer;border:1px solid #5a221f;background:#1c1012;padding:8px 12px;border-radius:12px}
  .dayvid svg{width:16px;height:16px;fill:currentColor;flex:none}

  /* ---------- next-up preview ---------- */
  .nextup{margin-top:12px;display:flex;align-items:center;gap:10px;color:var(--mut);font-size:12.5px;
    border:1px dashed var(--line);border-radius:12px;padding:11px 13px}
  .nextup .nu-ic{width:30px;height:30px;border-radius:8px;background:var(--card2);display:grid;place-items:center;flex:none}
  .nextup .nu-ic svg{width:22px;height:30px}
  .nextup b{color:var(--ink)}

  /* ---------- muscle library ---------- */
  .mexlist{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .mex{display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:var(--card);border-radius:16px;padding:11px 13px}
  .mex .mthumb{width:42px;height:42px;border-radius:11px;background:var(--card2);display:grid;place-items:center;flex:none}
  .mex .mthumb svg{width:30px;height:42px}
  .mex .mname{flex:1;min-width:0}
  .mex .mname .t{font-weight:600;font-size:14px;line-height:1.2}
  .mex .mname .s{color:var(--mut);font-size:11.5px;margin-top:3px}
  .mex .mname .s .badge{color:var(--accent2)}
  .mex .play{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#FF1A1A,#C4302B);display:grid;place-items:center;flex:none;cursor:pointer;transition:transform .1s}
  .mex .play:active{transform:scale(.92)}
  .mex .play svg{width:18px;height:18px;fill:#fff}
  .musback{display:flex;align-items:center;gap:8px;color:var(--accent2);font-size:13px;font-weight:600;cursor:pointer;margin-top:2px}
  .pstar{color:var(--gold);font-size:12px}

  /* ---------- inline video modal ---------- */
  .vmodal{position:fixed;inset:0;z-index:120;background:rgba(5,5,8,.94);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    display:none;align-items:center;justify-content:center;padding:18px}
  .vmodal.on{display:flex;animation:rise .2s ease}
  .vbox{width:100%;max-width:720px}
  .vbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .vbar .vt{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:.04em;color:var(--ink);text-transform:uppercase}
  .vclose{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--line);
    display:grid;place-items:center;color:var(--ink);font-size:18px;cursor:pointer;flex:none}
  .vframe{position:relative;padding-bottom:56.25%;height:0;border-radius:16px;overflow:hidden;background:#000;border:1px solid var(--line)}
  .vframe iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .vnote{color:var(--mut2);font-size:11px;margin-top:10px;text-align:center}

  /* exercise inline clip poster */
  .clipbtn{margin-top:14px;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
    border:none;border-radius:14px;padding:14px;cursor:pointer;
    background:linear-gradient(135deg,#FF1A1A,#C4302B);color:#fff;
    font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:.05em;text-transform:uppercase;
    box-shadow:0 8px 22px -10px rgba(255,0,0,.6);transition:transform .1s}
  .clipbtn:active{transform:scale(.97)}
  .clipbtn svg{width:24px;height:24px;fill:#fff;flex:none}
  .acard .aclip{margin-top:8px;display:inline-flex;align-items:center;gap:6px;color:#ff7a72;font-size:11px;font-weight:700;cursor:pointer}
  .acard .aclip svg{width:14px;height:14px;fill:currentColor}
  .acard .fig img.animg{width:100%;height:120px;object-fit:cover;border-radius:12px;display:block}

  /* exercise target-muscle anatomy card */
  .exanat{margin-top:12px;display:flex;align-items:center;gap:12px;border:1px solid var(--line);
    background:var(--card);border-radius:16px;padding:10px;overflow:hidden}
  .exanat-img{width:84px;height:64px;border-radius:10px;overflow:hidden;flex:none;background:var(--bg2)}
  .exanat-img img{width:100%;height:100%;object-fit:cover;display:block}
  .exanat-img svg{width:100%;height:100%}
  .exanat-b{flex:1;min-width:0}
  .exanat-t{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink)}
  .exanat-l{margin-top:6px;display:inline-flex;align-items:center;gap:6px;color:#ff7a72;font-size:12px;font-weight:700;cursor:pointer}
  .exanat-l svg{width:14px;height:14px;fill:currentColor}

  /* 12-month roadmap */

const brandEl = document.querySelector('.brand');
function applyTheme(){
  const p = PROG();
  const r = document.documentElement.style;
  r.setProperty('--accent', p.accent);
  r.setProperty('--accent2', p.accent2);
  r.setProperty('--accentdim', p.dim);
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content','#0B0B0F');
  if(brandEl){
    const parts = p.name.split(' ');
    if(parts.length>1){
      brandEl.innerHTML = `<span class="b1">${parts[0]}</span><span class="b2"> ${parts.slice(1).join(' ')}</span>`;
    } else {
      const h = Math.ceil(p.name.length/2);
      brandEl.innerHTML = `<span class="b1">${p.name.slice(0,h)}</span><span class="b2">${p.name.slice(h)}</span>`;
    }
  }
}
function setPhasePill(){
  phasePill.textContent = PROG().pill || PROG().coach || 'Phase '+(state.phase+1);
}

function render(){
  applyTheme();
  setPhasePill();
  if(state.tab==='home') return renderHome();
  if(state.tab==='train'){ return state.day===null ? renderPhase() : (state.ex===null? renderDayList(): renderExercise()); }
  if(state.tab==='muscles') return renderMuscles();
  if(state.tab==='anatomy') return renderAnatomy();
  if(state.tab==='guide') return renderGuide();
}

function todayDay(){
  // first non-rest day in current phase that's incomplete, else first day
  const days = PH()[state.phase].days;
  for(let i=0;i<days.length;i++){
    if(!days[i].rest){ const p=dayProgress(state.phase,i); if(p.done<p.total) return i; }
  }
  return days.findIndex(d=>!d.rest);
}

function renderHome(){
  const di = todayDay();

/* gather every exercise across all programs that targets a muscle key */
function exercisesForMuscle(mkey){
  const seen={}, out=[];
  PROGRAMS.forEach(p=>{
    p.phases.forEach(ph=>ph.days.forEach(d=>{
      if(d.rest) return;
      d.ex.forEach(e=>{
        if(e.mus!==mkey) return;
        const clean = e.name.replace(/ — FST-7| — DTP/,'');
        if(seen[clean]) return; seen[clean]=1;
        out.push({name:clean, sr:e.sr, pat:e.pat, coach:p.ytcoach, prog:p.name});
      });
    }));
  });
  return out;
}

function getLog(s){ const o = store['L'+key(state.phase,state.day+'_'+state.ex,s)]; return o?o.replace(/"/g,'&quot;'):''; }

function toggleSet(s,el){
  const k = key(state.phase, state.day+'_'+state.ex, s);
  const v = !store[k]; store[k]=v; el.classList.toggle('on',v);
  if(navigator.vibrate) navigator.vibrate(8);
  // auto-start the rest timer when a set is checked off
  if(v){
    const e = PH()[state.phase].days[state.day].ex[state.ex];
    startTimer(e.fst?45:90);
  }
}

/* ---------- timer ---------- */
let timerInt=null;
function startTimer(sec){
  clearInterval(timerInt);
  let t=sec; const el=document.getElementById('tnum');
  const fmt=x=>`${Math.floor(x/60)}:${String(x%60).padStart(2,'0')}`;
  el.textContent=fmt(t);
  timerInt=setInterval(()=>{ t--; if(t<=0){clearInterval(timerInt); el.textContent='Go!'; if(navigator.vibrate)navigator.vibrate([30,40,30]); return;} el.textContent=fmt(t); },1000);
}

function gotoPhase(i){ state.phase=i; state.tab='train'; state.day=null; state.ex=0; render(); window.scrollTo?.(0,0); view.scrollTop=0; }
function openDay(i){ state.tab='train'; state.day=i; state.ex=0; render(); view.scrollTop=0; }
function backToPhase(){ state.day=null; state.ex=0; render(); view.scrollTop=0; }
function nextEx(){ const n=PH()[state.phase].days[state.day].ex.length;
  if(state.ex<n-1){state.ex++; render(); view.scrollTop=0;} else {backToPhase();} clearInterval(timerInt); }
function prevEx(){ if(state.ex>0){state.ex--; render(); view.scrollTop=0;} clearInterval(timerInt); }

/* ---------- tab bar ---------- */
const TABS=[
  {id:'home', l:'Today', ic:'<path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/>'},
  {id:'train',l:'Plan', ic:'<rect x="4" y="5" width="16" height="14" rx="2"/><path d="M4 10h16"/><path d="M9 14h6"/>'},
  {id:'muscles',l:'Muscles', ic:'<path d="M6 4c2 0 3 1 4 3 1-2 2-3 4-3"/><path d="M5 8c0 5 3 9 7 11 4-2 7-6 7-11"/><path d="M9 11h6"/>'},
  {id:'anatomy',l:'Anatomy', ic:'<circle cx="12" cy="5" r="2.5"/><path d="M12 8v7"/><path d="M7 11l5-2 5 2"/><path d="M9 20l3-5 3 5"/>'},
  {id:'guide',l:'Playbook', ic:'<path d="M5 4h11a3 3 0 013 3v13H8a3 3 0 01-3-3z"/><path d="M5 4v13"/>'}
];
function buildTabs(){
  document.getElementById('tabbar').innerHTML = TABS.map(t=>`
    <div class="tab" id="tab-${t.id}" onclick="selTab('${t.id}')">
      <svg viewBox="0 0 24 24">${t.ic}</svg><div class="tl">${t.l}</div></div>`).join('');
}
function setActiveTab(id){ TABS.forEach(t=>document.getElementById('tab-'+t.id)?.classList.toggle('on',t.id===id)); }
function selTab(id){
  state.tab = id;
  if(id==='train'){ state.day=null; state.ex=0; }
  if(id==='muscles'){ state.muscle=null; }
  render(); view.scrollTop=0;
}

/* ---------- swipe navigation (left = next, right = previous/back) ---------- */
let _swX=0, _swY=0, _swT=0;
view.addEventListener('touchstart', e=>{
  const t=e.changedTouches[0]; _swX=t.clientX; _swY=t.clientY; _swT=Date.now();
}, {passive:true});
view.addEventListener('touchend', e=>{
  const t=e.changedTouches[0];
  const dx=t.clientX-_swX, dy=t.clientY-_swY, dt=Date.now()-_swT;
  if(dt>800) return;
  if(Math.abs(dx)<55 || Math.abs(dx) < Math.abs(dy)*1.5) return;   // must be a clear horizontal swipe
  if(e.target && e.target.tagName==='INPUT') return;               // don't hijack typing
  if(state.tab!=='train' || state.day===null || state.ex===null) return;
  const day = PH()[state.phase].days[state.day];
  if(day.rest) return;
  if(dx<0){ nextEx(); }                                            // swipe left → next
  else { state.ex===0 ? backToPhase() : prevEx(); }                // swipe right → prev / back
}, {passive:true});

buildTabs();
render();
</script>
